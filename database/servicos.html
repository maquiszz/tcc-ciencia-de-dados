<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Spa - Serviços</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            display: flex; gap: 20px; margin-bottom: 30px; background: white;
            padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        nav a { text-decoration: none; font-size: 15px; color: #666; font-weight: 500; padding: 5px 10px; }
        nav a.active { color: #6a11cb; font-weight: bold; border-bottom: 2px solid #6a11cb; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: #333; font-size: 32px; margin-bottom: 10px; }
        header p { color: #666; font-size: 16px; }
        
        .grid-servicos {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; width: 100%; max-width: 1200px;
        }
        .card {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.3s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-conteudo { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .card-titulo { font-size: 20px; color: #333; margin-bottom: 10px; font-weight: 600; }
        .card-preco { font-size: 22px; color: #2b6cb0; font-weight: bold; margin-bottom: 15px; }
        .card-contratos { font-size: 12px; color: #718096; margin-bottom: 15px; font-style: italic; }
        
        .btn-contratar {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        
        /* 🗓️ ESTILOS DO MODAL (JANELA DO CALENDÁRIO) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); z-index: 1000;
        }
        .modal-box {
            background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2); text-align: center; position: relative;
        }
        .modal-box h3 { margin-bottom: 15px; color: #333; }
        .modal-box label { display: block; text-align: left; margin: 12px 0 5px; font-size: 14px; font-weight: 600; color: #555; }
        .modal-box input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .btn-confirmar {
            width: 100%; padding: 12px; background: #2ecc71; color: white; border: none;
            border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
        .btn-fechar {
            position: absolute; top: 10px; right: 15px; background: none; border: none;
            font-size: 20px; cursor: pointer; color: #aaa;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">Catálogo de Serviços</a>
        <a href="/cadastro">Cadastro</a>
    </nav>

    <header>
        <h1>✨ Nossos Serviços ✨</h1>
        <p>Escolha a melhor experiência para o seu dia de bem-estar</p>
    </header>

    <main class="grid-servicos" id="container-servicos">
        <p style="text-align: center; grid-column: 1/-1;">⏳ Carregando catálogo de bem-estar...</p>
    </main>

    <div class="modal-overlay" id="agendamentoModal">
        <div class="modal-box">
            <button class="btn-fechar" onclick="fecharModal()">&times;</button>
            <h3 id="modalTitulo">Agendar Serviço</h3>
            
            <input type="hidden" id="modalServicoId">
            
            <label for="modalEmail">Seu E-mail de Cadastro:</label>
            <input type="email" id="modalEmail" placeholder="exemplo@email.com" required>
            
            <label for="modalData">Escolha a Data e Horário:</label>
            <input type="datetime-local" id="modalData" required>
            
            <button class="btn-confirmar" onclick="enviarAgendamento()">Confirmar Agendamento</button>
            <p id="modalStatus" style="margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
        </div>
    </div>

    <script>
        let servicosDados = [];

        async function carregarServicos() {
            const container = document.getElementById('container-servicos');
            try {
                const response = await fetch('/api/servicos');
                if (!response.ok) throw new Error("Erro na requisição");
                
                servicosDados = await response.json();
                container.innerHTML = ''; 

                if (servicosDados.length === 0) {
                    container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Nenhum serviço disponível.</p>';
                    return;
                }

                servicosDados.forEach(servico => {
                    const cardHtml = `
                        <div class="card">
                            <img src="${servico.imagem_url || 'https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?w=500'}" alt="${servico.tipo}">
                            <div class="card-conteudo">
                                <div>
                                    <h2 class="card-titulo">${servico.tipo}</h2>
                                    <p class="card-preco">R$ ${parseFloat(servico.valor).toFixed(2).replace('.', ',')}</p>
                                </div>
                                <div>
                                    <p class="card-contratos">Contratado ${servico.contratos} vezes</p>
                                    <button class="btn-contratar" onclick="abrirModal(${servico.id}, '${servico.tipo}')">Agendar Serviço</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: red;">❌ Erro ao carregar os serviços da API.</p>';
            }
        }

        // FUNÇÕES PARA CONTROLAR O MODAL DO CALENDÁRIO
        function abrirModal(id, tipo) {
            document.getElementById('modalServicoId').value = id;
            document.getElementById('modalTitulo').innerText = `Agendar: ${tipo}`;
            document.getElementById('modalStatus').innerText = '';
            document.getElementById('agendamentoModal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('agendamentoModal').style.display = 'none';
        }

        async function enviarAgendamento() {
            const id = document.getElementById('modalServicoId').value;
            const email = document.getElementById('modalEmail').value;
            const data = document.getElementById('modalData').value;
            const status = document.getElementById('modalStatus');

            if (!email || !data) {
                status.style.color = "red";
                status.innerText = "⚠️ Preencha todos os campos!";
                return;
            }

            status.style.color = "#333";
            status.innerText = "⏳ Processando agendamento...";

            try {
                const response = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ servico_id: id, email: email, data: data })
                });

                const resultado = await response.json();

                if (response.ok) {
                    status.style.color = "green";
                    status.innerText = "🎉 Agendado com sucesso! Atualizando...";
                    setTimeout(() => {
                        fecharModal();
                        carregarServicos(); // Recarrega os cards para atualizar o número de contratos na tela
                    }, 2000);
                } else {
                    status.style.color = "red";
                    status.innerText = `❌ ${resultado.error}`;
                }
            } catch (error) {
                status.style.color = "red";
                status.innerText = "❌ Falha ao conectar com o servidor.";
            }
        }

        window.onload = carregarServicos;
    </script>
</body>
</html>
