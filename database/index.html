<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Spa - Recepção</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #444;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <nav style="position: absolute; top: 20px; display: flex; gap: 20px;">
        <a href="/" style="color: #333; text-decoration: none; font-weight: bold; border-bottom: 2px solid #6a11cb; padding-bottom: 5px;">Cadastro</a>
        <a href="/servicos" style="color: #666; text-decoration: none; font-weight: 500;">Catálogo de Serviços</a>
    </nav>

    <div class="container">
        <h1>✨ Zenith Spa ✨</h1>
        <p class="subtitle">Cadastro de Clientes e Agendamentos</p>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Digite o nome do cliente" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail de Contato:</label>
                <input type="email" id="email" placeholder="exemplo@email.com" required>
            </div>

            <div class="form-group">
                <label for="servico">Serviço Desejado:</label>
                <select id="servico">
                    <option value="Massagem Relaxante">Massagem Relaxante</option>
                    <option value="Limpeza de Pele">Limpeza de Pele</option>
                    <option value="Banho de Ofurô">Banho de Ofurô</option>
                    <option value="Aromaterapia">Aromaterapia</option>
                </select>
            </div>

            <button type="submit">Confirmar Cadastro</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar
            
            const statusDiv = document.getElementById('status');
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const servico = document.getElementById('servico').value;

            statusDiv.style.color = "#333";
            statusDiv.innerText = "⏳ Enviando dados...";

            try {
                // Envia os dados para o nosso backend Python local
                const response = await fetch('/cadastrar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome, email, servico })
                });

                const resultado = await response.json();

                if (response.ok) {
                    statusDiv.style.color = "#2ecc71";
                    statusDiv.innerText = `🎉 ${nome} cadastrado com sucesso!`;
                    document.getElementById('cadastroForm').reset(); // Limpa os campos
                } else {
                    statusDiv.style.color = "#e74c3c";
                    statusDiv.innerText = `❌ Erro: ${resultado.error}`;
                }
            } catch (error) {
                statusDiv.style.color = "#e74c3c";
                statusDiv.innerText = "❌ Não foi possível conectar ao servidor backend.";
            }
        });
    </script>
</body>
</html>
